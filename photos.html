<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anna - Photos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo">Anna</a>
    <button class="menu-toggle" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav>
      <a href="introduction.html">Introduction</a>
      <a href="photos.html" class="active">Photos</a>
      <a href="quotes.html">Quotes</a>
      <a href="wishlist.html">Wishlist</a>
    </nav>
  </header>

  <section class="subpage">
    <h2 class="subpage-title">Photos</h2>
    <p class="subpage-text">A collection of favourite moments and memories.</p>
  </section>

  <script>
    const toggle = document.querySelector('.menu-toggle');
    const nav = document.querySelector('.site-header nav');
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      nav.classList.toggle('open');
    });
    nav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        toggle.classList.remove('open');
        nav.classList.remove('open');
      });
    });
  </script>
</body>
</html>
